name: barifit_app
description: "Barifit+ — App completo de acompanhamento pós-bariátrico com IA, treinos, refeições e scanbody."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local Storage / Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Charts & Analytics
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5

  # Markdown
  flutter_markdown: ^0.7.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Auth & Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0

  # AI / OpenAI
  dart_openai: ^4.1.0

  # Animations
  flutter_animate: ^4.5.0

  # Sharing & Utils
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  image: ^4.2.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
