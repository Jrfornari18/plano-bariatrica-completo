version: "3.9"

# BodyScan KB & Memory — Docker Compose para desenvolvimento local
# Uso: docker-compose up
# Para produção com PostgreSQL: usar docker-compose.prod.yml

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persistir banco SQLite fora do container (MVP)
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/bodyscan_kb.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

